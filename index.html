<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peshras - Доставка еды</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .menu-overlay { transform: translateX(-100%); transition: transform 0.3s; }
        .menu-overlay.active { transform: translateX(0); }
    </style>
</head>
<body class="bg-slate-950 text-white pb-28 font-sans">

    <!-- 1. ШАПКА -->
    <header class="flex justify-between items-center p-4 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="flex items-center gap-2">
            <img src="1000093662.jpg" class="w-8 h-8 rounded-full">
            <span class="font-black text-lg tracking-tight">PESHRAS</span>
        </div>
        <button onclick="document.getElementById('mobile-menu').classList.add('active')" class="text-2xl">☰</button>
    </header>

    <!-- Выезжающее меню -->
    <div id="mobile-menu" class="menu-overlay fixed inset-0 bg-slate-950 z-50 p-6 flex flex-col gap-6">
        <button onclick="document.getElementById('mobile-menu').classList.remove('active')" class="text-2xl self-end">✕</button>
        <nav class="flex flex-col gap-4 text-xl font-bold">
            <a href="#">Доставка</a>
            <a href="#">Оплата</a>
            <a href="#">О нас</a>
            <a href="#">Контакты</a>
        </nav>
    </div>

    <!-- 2. РЕСТОРАНЫ (Сетка) -->
    <section class="p-4">
        <h2 class="text-xl font-bold mb-4">Рестораны</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="h-24 bg-slate-900 rounded-3xl border border-slate-800"></div>
            <div class="h-24 bg-slate-900 rounded-3xl border border-slate-800"></div>
        </div>
    </section>

    <!-- 3. СЛАЙДЕРЫ (Хиты / Новинки) -->
    <section class="p-4">
        <h2 class="text-xl font-bold mb-4">Хиты продаж</h2>
        <div class="flex overflow-x-auto gap-4 scrollbar-hide">
            <div class="min-w-[140px] h-48 bg-slate-900 rounded-3xl border border-slate-800"></div>
            <div class="min-w-[140px] h-48 bg-slate-900 rounded-3xl border border-slate-800"></div>
            <div class="min-w-[140px] h-48 bg-slate-900 rounded-3xl border border-slate-800"></div>
        </div>
    </section>

    <!-- 4. ФУТЕР -->
    <footer class="p-6 text-center text-slate-500 text-sm">
        <p>© 2026 Kurush Digital</p>
        <div class="flex justify-center gap-4 mt-2">
            <a href="#">Instagram</a> | <a href="#">Telegram</a>
        </div>
    </footer>

    <!-- 5. НИЖНЕЕ МЕНЮ (Telegram Style) -->
    <nav class="fixed bottom-4 left-4 right-4 bg-[#181a20] rounded-full p-4 flex justify-around items-center border border-slate-700 shadow-2xl z-50">
        <a href="index.html" class="flex flex-col items-center text-blue-400"><span class="text-xl">🏠</span><span class="text-[10px]">Меню</span></a>
        <a href="#" class="flex flex-col items-center text-gray-400"><span class="text-xl">⭐</span><span class="text-[10px]">Избранное</span></a>
        <a href="cart.html" class="flex flex-col items-center text-gray-400"><span class="text-xl">🛒</span><span class="text-[10px]">Корзина</span></a>
        <a href="#" class="flex flex-col items-center text-gray-400"><span class="text-xl">👤</span><span class="text-[10px]">Профиль</span></a>
    </nav>

</body>
</html>
