<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Peshras — доставка еды в Исфаре</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0A0A0F;
    --bg-soft: #14141C;
    --accent: #FF7A45;
    --accent-soft: #FFB088;
    --good: #4ADE80;
    --text: #F5F5F7;
    --text-muted: #9499A8;
  }
  * { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Manrope', sans-serif; }
  body { background: var(--bg); color: var(--text); }
  .glass {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
  }
  .glass-strong {
    background: rgba(20,20,28,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(24px);
  }
  .scroll-row::-webkit-scrollbar { display: none; }
  .scroll-row { scrollbar-width: none; scroll-snap-type: x mandatory; }
  .scroll-row > * { scroll-snap-align: start; }
  .glow {
    position: absolute;
    border-radius: 9999px;
    filter: blur(60px);
    opacity: 0.35;
    pointer-events: none;
  }
</style>
</head>

<body class="min-h-screen pb-28 relative overflow-x-hidden">

<div class="glow w-72 h-72 bg-[#FF7A45] -top-20 -left-10"></div>
<div class="glow w-72 h-72 bg-[#34D399] top-40 right-0"></div>

<!-- HEADER -->
<header class="sticky top-0 z-40 glass-strong px-4 py-3 flex items-center justify-between">
  <button id="menuBtn" class="w-10 h-10 rounded-2xl glass flex items-center justify-center">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <div class="flex items-center gap-2">
    <div class="w-9 h-9 rounded-2xl bg-[var(--accent)] flex items-center justify-center text-lg">🥘</div>
    <span class="font-display font-extrabold text-xl">Peshras</span>
  </div>
  <button id="cartBtn" class="relative w-10 h-10 rounded-2xl glass flex items-center justify-center">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293A1 1 0 005 17h12"/>
    </svg>
    <span id="cartCount" class="absolute -top-1 -right-1 bg-[var(--accent)] text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
  </button>
</header>

<!-- DRAWER MENU -->
<div id="drawerOverlay" class="fixed inset-0 bg-black/50 z-40 hidden"></div>
<aside id="drawer" class="fixed top-0 left-0 h-full w-72 z-50 glass-strong p-5 -translate-x-full transition-transform duration-300">
  <div class="flex items-center gap-2 mb-8">
    <div class="w-9 h-9 rounded-2xl bg-[var(--accent)] flex items-center justify-center text-lg">🥘</div>
    <span class="font-display font-extrabold text-xl">Peshras</span>
  </div>
  <nav class="flex flex-col gap-2 text-[15px]">
    <a href="#" class="px-4 py-3 rounded-2xl glass flex items-center gap-3"><span>ℹ️</span> О нас</a>
    <a href="#" class="px-4 py-3 rounded-2xl glass flex items-center gap-3"><span>🛵</span> Доставка</a>
    <a href="#" class="px-4 py-3 rounded-2xl glass flex items-center gap-3"><span>💳</span> Оплата</a>
  </nav>
  <p class="text-xs text-[var(--text-muted)] mt-10">г. Исфара, Согдийская область</p>
</aside>

<!-- MAIN CONTENT -->
<main class="px-4 mt-4">
  <section class="mb-5">
    <h1 class="font-display text-2xl font-bold mb-1">Ассалому алейкум 👋</h1>
    <p class="text-[var(--text-muted)] text-sm mb-4">Что хочется заказать сегодня?</p>
    <div class="relative">
      <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text-muted)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="M21 21l-3.5-3.5"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Поиск блюд и ресторанов"
        class="w-full glass rounded-2xl py-3 pl-12 pr-4 text-sm placeholder:text-[var(--text-muted)] outline-none focus:ring-2 focus:ring-[var(--accent)]">
    </div>
  </section>

  <section class="mb-6">
    <div class="glass rounded-3xl p-5 relative overflow-hidden">
      <div class="glow w-40 h-40 bg-[var(--accent)] -right-10 -bottom-10"></div>
      <p class="text-sm text-[var(--text-muted)] mb-1">Сегодняшнее предложение</p>
      <h2 class="font-display text-xl font-bold mb-2">Бесплатная доставка от 100 сомони</h2>
    </div>
  </section>

  <section class="mb-6">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-display text-lg font-bold">Рестораны</h3>
    </div>
    <div id="restaurantsRow" class="scroll-row flex gap-3 overflow-x-auto pb-2"></div>
  </section>

  <section class="mb-6">
    <h3 class="font-display text-lg font-bold mb-3">Рекомендации</h3>
    <div id="recommendedRow" class="scroll-row flex gap-3 overflow-x-auto pb-2"></div>
  </section>

  <section class="mb-6">
    <h3 class="font-display text-lg font-bold mb-3">🔥 Хит недели</h3>
    <div id="hitRow" class="scroll-row flex gap-3 overflow-x-auto pb-2"></div>
  </section>

  <section class="mb-6">
    <h3 class="font-display text-lg font-bold mb-3">✨ Новинки</h3>
    <div id="newRow" class="scroll-row flex gap-3 overflow-x-auto pb-2"></div>
  </section>
</main>

<!-- BOTTOM TAB BAR -->
<nav class="fixed bottom-3 left-3 right-3 z-40 glass-strong rounded-3xl px-4 py-3 flex justify-between items-center">
  <a href="index.html" class="flex flex-col items-center gap-1 text-[var(--accent)] text-xs"><span class="text-lg">🏠</span> Главная</a>
  <a href="#" class="flex flex-col items-center gap-1 text-[var(--text-muted)] text-xs"><span class="text-lg">🔎</span> Поиск</a>
  <a href="cart.html" class="flex flex-col items-center gap-1 text-[var(--text-muted)] text-xs"><span class="text-lg">🛒</span> Корзина</a>
</nav>

<script>
// КОНФИГУРАЦИЯ
const API_URL = "https://script.google.com/macros/s/AKfycbyV52su-PBIS-rVV_-EuMb69RrL4jV0xNUnlejLTSsuZIBpXrQYuuBKKurUYWvnf2tTIg/exec";
const CART_KEY = 'peshras_cart';

// Глобальные данные
let restaurantsData = [];
let menuData = [];
let restaurantsById = {};

// ========== КОРЗИНА ==========
function loadCart() {
    const saved = localStorage.getItem(CART_KEY);
    if (!saved) return { restaurantId: null, items: [] };
    try {
        return JSON.parse(saved);
    } catch(e) {
        return { restaurantId: null, items: [] };
    }
}

function saveCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    updateCartCounter();
}

function updateCartCounter() {
    const cart = loadCart();
    const countEl = document.getElementById('cartCount');
    const totalItems = cart.items.reduce((sum, i) => sum + i.quantity, 0);
    if (totalItems > 0) {
        countEl.textContent = totalItems;
        countEl.classList.remove('hidden');
    } else {
        countEl.classList.add('hidden');
    }
}

function getRestaurantNameById(id) {
    const r = restaurantsData.find(r => r.id == id);
    return r ? r.name : 'Ресторан';
}

function showToast(message) {
    let toast = document.getElementById('customToast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'customToast';
        toast.className = 'fixed bottom-24 left-4 right-4 glass-strong rounded-2xl px-4 py-3 text-center z-50 transition-opacity duration-300 opacity-0';
        document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
}

window.addToCart = function(item) {
    const cart = loadCart();
    const newRestaurantId = item.restaurant_id;
    
    if (cart.restaurantId !== null && cart.restaurantId !== newRestaurantId) {
        const oldName = getRestaurantNameById(cart.restaurantId);
        const newName = getRestaurantNameById(newRestaurantId);
        const userConfirmed = confirm(
            `❌ В корзине уже есть товары из "${oldName}".\n\n` +
            `Очистить корзину и добавить "${item.name}" из "${newName}"?`
        );
        if (userConfirmed) {
            localStorage.removeItem(CART_KEY);
            window.addToCart(item);
        }
        return;
    }
    
    if (cart.restaurantId === null) {
        cart.restaurantId = newRestaurantId;
    }
    
    const existingIndex = cart.items.findIndex(i => i.id === item.id);
    if (existingIndex !== -1) {
        cart.items[existingIndex].quantity += 1;
    } else {
        cart.items.push({
            id: item.id,
            name: item.name,
            price: item.price,
            quantity: 1,
            photo_url: item.photo_url,
            restaurant_id: item.restaurant_id
        });
    }
    
    saveCart(cart);
    showToast(`✓ ${item.name} добавлен`);
};

// ========== РЕНДЕР ==========
function renderRestaurantCard(r) {
    return `
        <div class="glass rounded-3xl min-w-[200px] overflow-hidden flex-shrink-0">
            <div class="relative h-28">
                <img src="${r.logo_url || 'https://placehold.co/400x300/14141C/9499A8?text=' + encodeURIComponent(r.name)}" class="w-full h-full object-cover">
                <span class="absolute top-2 right-2 text-[11px] font-semibold px-2 py-1 rounded-full glass-strong text-[var(--good)]">● Открыто</span>
            </div>
            <div class="p-3">
                <p class="font-semibold text-sm mb-1">${r.name}</p>
                <p class="text-xs text-[var(--text-muted)]">⭐ ${r.rating || '—'} · ${r.delivery_time || ''} мин</p>
            </div>
        </div>`;
}

function renderItemCard(item) {
    const restaurantName = getRestaurantNameById(item.restaurant_id);
    return `
        <div class="glass rounded-3xl min-w-[160px] overflow-hidden flex-shrink-0">
            <div class="h-24">
                <img src="${item.photo_url || 'https://placehold.co/400x300/14141C/9499A8?text=' + encodeURIComponent(item.name)}" class="w-full h-full object-cover">
            </div>
            <div class="p-3">
                <p class="font-semibold text-sm leading-tight mb-1">${item.name}</p>
                <p class="text-xs text-[var(--text-muted)] mb-2">${restaurantName}</p>
                <div class="flex items-center justify-between">
                    <span class="font-display font-bold text-sm">${item.price} сом.</span>
                    <button onclick="addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')})"
                        class="w-8 h-8 rounded-full bg-[var(--accent)] text-black flex items-center justify-center text-lg leading-none font-bold">+</button>
                </div>
            </div>
        </div>`;
}

// ========== ЗАГРУЗКА ДАННЫХ ==========
async function loadData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        
        restaurantsData = data.restaurants || [];
        menuData = data.menu || [];
        
        restaurantsById = {};
        restaurantsData.forEach(r => restaurantsById[r.id] = r);
        
        document.getElementById('restaurantsRow').innerHTML = restaurantsData.map(renderRestaurantCard).join('');
        
        const recommendations = menuData.filter(m => m.category === 'Рекомендации');
        const hits = menuData.filter(m => m.category === 'Хит недели');
        const news = menuData.filter(m => m.category === 'Новинки');
        
        document.getElementById('recommendedRow').innerHTML = recommendations.map(renderItemCard).join('');
        document.getElementById('hitRow').innerHTML = hits.map(renderItemCard).join('');
        document.getElementById('newRow').innerHTML = news.map(renderItemCard).join('');
        
    } catch(err) {
        console.error('Ошибка загрузки:', err);
        document.getElementById('restaurantsRow').innerHTML = '<p class="text-red-400">Ошибка загрузки данных</p>';
    }
}

// ========== ПОИСК ==========
document.getElementById('searchInput')?.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase();
    if (!query) {
        loadData();
        return;
    }
    const filtered = menuData.filter(m => 
        m.name.toLowerCase().includes(query) || 
        getRestaurantNameById(m.restaurant_id).toLowerCase().includes(query)
    );
    document.getElementById('recommendedRow').innerHTML = filtered.map(renderItemCard).join('');
    document.getElementById('hitRow').innerHTML = '';
    document.getElementById('newRow').innerHTML = '';
});

// ========== ИНИЦИАЛИЗАЦИЯ ==========
document.addEventListener('DOMContentLoaded', () => {
    loadData();
    updateCartCounter();
    
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('drawerOverlay');
    document.getElementById('menuBtn').addEventListener('click', () => {
        drawer.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    });
    overlay.addEventListener('click', () => {
        drawer.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    });
    
    document.getElementById('cartBtn').addEventListener('click', () => {
        window.location.href = 'cart.html';
    });
});
</script>
</body>
</html>
