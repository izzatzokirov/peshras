<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Корзина — Peshras</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0A0F;
    --accent: #FF7A45;
    --text: #F5F5F7;
    --text-muted: #9499A8;
  }
  * { font-family: 'Inter', sans-serif; }
  .font-display { font-family: 'Manrope', sans-serif; }
  body { background: var(--bg); color: var(--text); }
  .glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
  }
  .glass-strong {
    background: rgba(20,20,28,0.9);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
  }
</style>
</head>
<body class="min-h-screen pb-32">

<!-- Шапка -->
<header class="sticky top-0 z-40 glass-strong px-4 py-3 flex items-center">
  <a href="index.html" class="w-10 h-10 rounded-2xl glass flex items-center justify-center mr-3 text-xl">←</a>
  <span class="font-display font-extrabold text-xl">Корзина</span>
</header>

<!-- Основной контент -->
<main class="px-4 mt-4">
  <div id="cartContainer" class="space-y-3"></div>
  <div id="emptyCart" class="text-center py-20 hidden">
    <p class="text-6xl mb-4">🛒</p>
    <p class="text-[var(--text-muted)] text-lg">Ваша корзина пуста</p>
    <p class="text-sm text-[var(--text-muted)] mt-2">Добавьте блюда из ресторанов</p>
    <a href="index.html" class="inline-block mt-6 px-6 py-3 bg-[var(--accent)] text-black rounded-2xl font-semibold">Выбрать блюда</a>
  </div>
</main>

<!-- Нижняя панель с итогом -->
<nav class="fixed bottom-0 left-0 right-0 p-4 glass-strong">
  <div class="flex justify-between items-center mb-3">
    <span class="text-[var(--text-muted)]">Ресторан:</span>
    <span id="restaurantName" class="font-semibold text-sm">—</span>
  </div>
  <div class="flex justify-between items-center mb-4">
    <span class="text-[var(--text-muted)]">Итого:</span>
    <span id="totalPrice" class="font-display text-2xl font-bold text-[var(--accent)]">0 сом.</span>
  </div>
  <button id="checkoutBtn" class="w-full bg-[var(--accent)] text-black py-3 rounded-2xl font-semibold disabled:opacity-50 transition-all">
    Оформить заказ →
  </button>
</nav>

<script>
const CART_KEY = 'peshras_cart';

// Загрузка корзины
function loadCart() {
    const saved = localStorage.getItem(CART_KEY);
    if (!saved) return { restaurantId: null, items: [] };
    try {
        return JSON.parse(saved);
    } catch(e) {
        return { restaurantId: null, items: [] };
    }
}

// Сохранение корзины
function saveCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    renderCart();
}

// Получение названия ресторана (из localStorage или API)
function getRestaurantName(restaurantId) {
    if (!restaurantId) return '—';
    // Пытаемся получить из сохранённых данных
    const savedRestaurants = localStorage.getItem('peshras_restaurants');
    if (savedRestaurants) {
        const restaurants = JSON.parse(savedRestaurants);
        const found = restaurants.find(r => r.id == restaurantId);
        if (found) return found.name;
    }
    return `Ресторан #${restaurantId}`;
}

// Отображение корзины
function renderCart() {
    const cart = loadCart();
    const container = document.getElementById('cartContainer');
    const emptyDiv = document.getElementById('emptyCart');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const restaurantNameSpan = document.getElementById('restaurantName');
    
    if (!cart.items.length) {
        container.innerHTML = '';
        emptyDiv.classList.remove('hidden');
        checkoutBtn.disabled = true;
        restaurantNameSpan.textContent = '—';
        document.getElementById('totalPrice').textContent = '0 сом.';
        return;
    }
    
    emptyDiv.classList.add('hidden');
    checkoutBtn.disabled = false;
    
    // Показываем название ресторана
    restaurantNameSpan.textContent = getRestaurantName(cart.restaurantId);
    
    let total = 0;
    container.innerHTML = cart.items.map(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        return `
            <div class="glass p-3 rounded-2xl flex gap-3">
                <img src="${item.photo_url || 'https://placehold.co/80x80/14141C/9499A8?text=🍽️'}" 
                     class="w-20 h-20 rounded-xl object-cover" 
                     onerror="this.src='https://placehold.co/80x80/14141C/9499A8?text=🍽️'">
                <div class="flex-1">
                    <p class="font-semibold text-base">${escapeHtml(item.name)}</p>
                    <p class="text-sm text-[var(--text-muted)] mt-1">${item.price} сом. × ${item.quantity}</p>
                    <p class="text-[var(--accent)] font-bold mt-1">${itemTotal} сом.</p>
                </div>
                <div class="flex flex-col gap-1">
                    <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" 
                            class="w-8 h-8 rounded-full glass text-lg hover:bg-[var(--accent)] hover:text-black transition">+</button>
                    <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" 
                            class="w-8 h-8 rounded-full glass text-lg hover:bg-[var(--accent)] hover:text-black transition">−</button>
                    <button onclick="removeItem(${item.id})" 
                            class="w-8 h-8 rounded-full glass text-red-400 text-sm hover:bg-red-400/20 transition">🗑</button>
                </div>
            </div>
        `;
    }).join('');
    
    document.getElementById('totalPrice').textContent = `${total} сом.`;
}

// Функция для безопасности (экранирование HTML)
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Обновление количества
window.updateQuantity = function(id, newQty) {
    const cart = loadCart();
    const item = cart.items.find(i => i.id === id);
    if (newQty <= 0) {
        cart.items = cart.items.filter(i => i.id !== id);
        if (cart.items.length === 0) cart.restaurantId = null;
    } else {
        item.quantity = newQty;
    }
    saveCart(cart);
};

// Удаление товара
window.removeItem = function(id) {
    const cart = loadCart();
    cart.items = cart.items.filter(i => i.id !== id);
    if (cart.items.length === 0) cart.restaurantId = null;
    saveCart(cart);
};

// Кнопка оформления
document.getElementById('checkoutBtn').addEventListener('click', () => {
    const cart = loadCart();
    if (cart.items.length === 0) {
        alert('Корзина пуста');
        return;
    }
    window.location.href = 'checkout.html';
});

// Загрузка страницы
renderCart();
</script>
</body>
</html>
